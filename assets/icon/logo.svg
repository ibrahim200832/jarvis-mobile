<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="42%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#153634"/>
      <stop offset="55%" stop-color="#0B211F"/>
      <stop offset="100%" stop-color="#051211"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEAFF"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#5EEAFF"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>

  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="204" fill="none" stroke="url(#ring)"
      stroke-width="14" stroke-linecap="round"
      stroke-dasharray="1068.2 213.6"
      transform="rotate(-90 256 256)"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="243" cy="112" r="19" fill="#5EEAFF"/>
  </g>

  <path d="M243,150 L243,300 Q243,362 185,362 Q145,362 145,325"
    fill="none" stroke="#F4F7F6" stroke-width="34"
    stroke-linecap="round" stroke-linejoin="round"/>

  <g fill="url(#bars)">
    <rect x="298" y="270" width="17" height="56" rx="8.5"/>
    <rect x="327" y="240" width="17" height="86" rx="8.5"/>
    <rect x="356" y="258" width="17" height="68" rx="8.5"/>
    <rect x="385" y="286" width="17" height="40" rx="8.5"/>
  </g>
</svg>
