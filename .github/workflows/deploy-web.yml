name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate icons and favicon
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          mkdir -p web/icons
          convert -size 192x192 xc:"#0891B2" web/icons/Icon-192.png
          convert -size 512x512 xc:"#0891B2" web/icons/Icon-512.png
          convert -size 192x192 xc:"#0891B2" web/icons/Icon-maskable-192.png
          convert -size 512x512 xc:"#0891B2" web/icons/Icon-maskable-512.png
          convert -size 16x16 xc:"#0891B2" web/favicon.png
          declare -A sizes=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          for density in "${!sizes[@]}"; do
            size="${sizes[$density]}"
            dir="android/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"
            convert -size "${size}x${size}" xc:"#0891B2" "$dir/ic_launcher.png"
          done

      - run: flutter pub get
      - run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
      - run: flutter build apk --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      - name: Bundle the Android APK and version manifest into the website
        run: |
          mkdir -p build/web/downloads
          cp build/app/outputs/flutter-apk/app-release.apk build/web/downloads/jarvis-mobile.apk
          cat > build/web/downloads/version.json <<EOF
          {
            "version": "1.0.${{ github.run_number }}",
            "apkUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/downloads/jarvis-mobile.apk"
          }
          EOF

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
