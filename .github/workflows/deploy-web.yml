name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate icons and favicon from logo
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          mkdir -p web/icons
          rsvg-convert -w 192 -h 192 assets/icon/logo.svg -o web/icons/Icon-192.png
          rsvg-convert -w 512 -h 512 assets/icon/logo.svg -o web/icons/Icon-512.png
          rsvg-convert -w 192 -h 192 assets/icon/logo_maskable.svg -o web/icons/Icon-maskable-192.png
          rsvg-convert -w 512 -h 512 assets/icon/logo_maskable.svg -o web/icons/Icon-maskable-512.png
          rsvg-convert -w 48 -h 48 assets/icon/logo.svg -o web/favicon.png
          declare -A sizes=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          for density in "${!sizes[@]}"; do
            size="${sizes[$density]}"
            dir="android/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"
            rsvg-convert -w "$size" -h "$size" assets/icon/logo.svg -o "$dir/ic_launcher.png"
          done

      - name: Set up Android release signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/jarvis-release.jks
          cat > android/key.properties <<EOF
          storeFile=jarvis-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=jarvis
          EOF

      - run: flutter pub get
      - run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
      - run: flutter build apk --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      - name: Bundle the Android APK and version manifest into the website
        run: |
          mkdir -p build/web/downloads
          cp build/app/outputs/flutter-apk/app-release.apk build/web/downloads/jarvis-mobile.apk
          cat > build/web/downloads/version.json <<EOF
          {
            "version": "1.0.${{ github.run_number }}",
            "apkUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/downloads/jarvis-mobile.apk"
          }
          EOF

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
