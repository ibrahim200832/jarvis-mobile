name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate launcher icons from logo
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          declare -A sizes=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          for density in "${!sizes[@]}"; do
            size="${sizes[$density]}"
            dir="android/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"
            rsvg-convert -w "$size" -h "$size" assets/icon/logo.svg -o "$dir/ic_launcher.png"
          done

      - name: Set up Android release signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/jarvis-release.jks
          cat > android/key.properties <<EOF
          storeFile=jarvis-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=jarvis
          EOF

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: jarvis-mobile-apk
          path: build/app/outputs/flutter-apk/app-release.apk
